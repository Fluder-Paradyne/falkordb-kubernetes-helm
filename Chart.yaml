apiVersion: v2
name: falkordb-kubernetes
description: >
  FalkorDB (Redis graph module) on Bitnami Redis with Sentinel. Corrects the
  official one-line values example: Bitnami defaults assume the Bitnami Redis
  image; this chart supplies FalkorDB-specific commonConfiguration, an init
  container that stages Bitnami helper scripts for start-node.sh, and avoids
  cp -a timestamp issues on emptyDir.
type: application
version: 0.1.0
appVersion: "4.16.7"
dependencies:
  - name: redis
    version: "25.3.6"
    repository: "oci://registry-1.docker.io/bitnamicharts"
